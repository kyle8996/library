<style>
  :root{
    --brand:#FF7A33; --brand2:#FFB24D; --teal:#13B5A6;
    --ink:#2b2b2b; --paper:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
    color:var(--ink);background:#e9e9e9;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .print-btn{
    position:fixed;top:16px;right:16px;z-index:99;background:var(--brand);color:#fff;
    border:none;border-radius:999px;padding:12px 20px;font-size:16px;font-weight:700;cursor:pointer;
    box-shadow:0 6px 18px rgba(255,122,51,.4);
  }
  .print-btn:hover{filter:brightness(1.05);}

  .page{
    width:210mm;margin:14mm auto;background:var(--paper);
    border-radius:10px;overflow:hidden;position:relative;
    box-shadow:0 10px 40px rgba(0,0,0,.18);display:flex;flex-direction:column;
  }

  /* 顶部品牌条 */
  .header{
    background:linear-gradient(120deg,var(--brand),var(--brand2));
    color:#fff;text-align:center;padding:10mm 10mm 8mm;
  }
  .header .brand{
    font-size:42pt;font-weight:800;letter-spacing:2px;line-height:1.1;
    text-shadow:0 2px 6px rgba(0,0,0,.12);
  }
  .header .title{margin-top:6mm;font-size:22pt;font-weight:700;letter-spacing:1px;}

  /* 二维码区 */
  .qr-wrap{padding:6mm 10mm 4mm;text-align:center;}
  .qr-box{
    display:inline-block;background:#fff;border:3px solid var(--teal);border-radius:16px;
    padding:8px;box-shadow:0 6px 20px rgba(19,181,166,.18);
  }
  .qr-box img{display:block;width:110mm;height:110mm;}
  .qr-tip{margin-top:7mm;font-size:14pt;color:#555;font-weight:600;}

  /* 步骤 */
  .steps{display:flex;gap:5mm;padding:0 10mm 5mm;justify-content:center;}
  .step{
    flex:1;background:#fff;border:1.5px solid #ffe1c4;border-radius:12px;padding:4mm 3mm;text-align:center;
  }
  .step .num{
    width:11mm;height:11mm;line-height:11mm;margin:0 auto 2mm;background:var(--brand);
    color:#fff;border-radius:50%;font-size:14pt;font-weight:800;
  }
  .step .t{font-size:12pt;font-weight:700;color:var(--ink);}
  .step .d{font-size:9.5pt;color:#666;margin-top:1.5mm;line-height:1.35;}

  /* 温馨提示 */
  .note{
    margin:0 10mm 2mm;background:#fff7ec;border-left:6px solid var(--brand2);
    border-radius:0 10px 10px 0;padding:4mm 5mm;font-size:11.5pt;color:#7a5320;line-height:1.5;
  }
  .note b{color:var(--brand);}

  /* 页脚 */
  .footer{
    margin-top:2mm;background:var(--teal);color:#fff;text-align:center;
    padding:5mm 10mm;font-size:13pt;font-weight:600;letter-spacing:1px;
  }

  @media print{
    body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .print-btn{display:none;}
    .page{margin:0;width:auto;min-height:auto;box-shadow:none;border-radius:0;}
    @page{size:A4;margin:0;}
  }
</style>
